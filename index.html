<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control de Terapias Cloud</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lucide/0.263.0/lucide.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    
    <!-- Firebase SDKs -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, doc, setDoc, onSnapshot, collection, query } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        // Global variables provided by the environment
        const firebaseConfig = JSON.parse(__firebase_config);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'terapias-default';
        
        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        // --- Estado de la aplicación ---
        let patients = [];
        let currentFilter = 'all';
        let currentView = 'list';
        let activePatientId = null;
        let currentUser = null;

        const SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQoCf5CWedeuTWLDPk6qJO8P0TrBiItTN2Ei0VVSq_Jy8YtcL6OvgvRFurtfg6JgA/pub?output=csv";

        // --- Funciones de Utilidad ---
        window.showToast = (m) => {
            const t = document.getElementById("toast");
            t.innerText = m;
            t.className = "show";
            setTimeout(() => t.className = "", 3000);
        };

        window.closeModal = (id) => {
            const el = document.getElementById(id);
            if (el) el.classList.replace('flex', 'hidden');
        };

        // --- Lógica de Sincronización ---
        async function syncToCloud(updatedPatients) {
            if (!currentUser) return;
            try {
                const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'appState', 'main');
                await setDoc(docRef, { 
                    patients: updatedPatients,
                    lastSync: Date.now()
                }, { merge: true });
            } catch (e) {
                console.error("Error al guardar en nube:", e);
            }
        }

        // --- Procesamiento de Datos ---
        window.processSheetData = (data) => {
            const freshData = data.filter(row => row.Nombre || row.Paciente).map((row, index) => {
                const nombre = row.Nombre || row.Paciente || 'Sin Nombre';
                const direccion = String(row.Direccion || row.Dirección || row.Ciudad || "").toLowerCase().trim();
                const diaValorOriginal = String(row.Dia || row.Día || "").trim();
                const diaBusqueda = diaValorOriginal.toLowerCase();

                let grupo = 'otros';
                if (direccion.includes('circasia')) grupo = 'circasia';
                else if (diaBusqueda.includes('miercoles') || diaBusqueda.includes('miércoles')) grupo = 'lun_mie';

                const tFisica = parseInt(row['T. FISICA'] || row['FISICA'] || 0);
                const tOcupacional = parseInt(row['T. OCUPACIONAL'] || row['OCUPACIONAL'] || 0);
                const tRespira = parseInt(row['T.RESPIRA'] || row['RESPIRATORIA'] || 0);

                const existing = patients.find(p => p.nombre === nombre);

                return {
                    id: index,
                    nombre: nombre,
                    direccion: row.Direccion || row.Dirección || row.Ciudad || 'Sin Dirección',
                    dia: diaValorOriginal,
                    horario: existing ? existing.horario : '',
                    grupo: grupo,
                    terapias: {
                        fisica: { total: tFisica, realizada: existing ? existing.terapias.fisica.realizada : 0 },
                        ocupacional: { total: tOcupacional, realizada: existing ? existing.terapias.ocupacional.realizada : 0 },
                        respiratoria: { total: tRespira, realizada: existing ? existing.terapias.respiratoria.realizada : 0 }
                    },
                    completadas: existing ? (existing.terapias.fisica.realizada + existing.terapias.ocupacional.realizada + existing.terapias.respiratoria.realizada) : 0,
                    totalSesiones: (tFisica + tOcupacional + tRespira) || 0
                };
            });

            patients = freshData;
            syncToCloud(patients);
            renderAll();
        };

        window.fetchSheetData = () => {
            const syncIcon = document.getElementById('syncIcon');
            const syncStatus = document.getElementById('syncStatus');
            syncIcon?.classList.add('animate-spin');
            syncStatus.innerText = "Sincronizando Excel...";

            Papa.parse(SHEET_URL, {
                download: true,
                header: true,
                skipEmptyLines: true,
                complete: function(results) {
                    processSheetData(results.data);
                    syncIcon?.classList.remove('animate-spin');
                    syncStatus.innerText = "Excel Sincronizado";
                    showToast("Datos de Excel actualizados");
                },
                error: () => {
                    syncIcon?.classList.remove('animate-spin');
                    syncStatus.innerText = "Error Excel";
                }
            });
        };

        // --- Renderizado ---
        function renderAll() {
            if (currentView === 'list') renderPatients(); else renderCalendar();
            if (typeof lucide !== 'undefined') lucide.createIcons();
        }

        window.switchView = (view) => {
            currentView = view;
            document.getElementById('view-list').classList.toggle('hidden', view !== 'list');
            document.getElementById('view-calendar').classList.toggle('hidden', view !== 'calendar');
            document.getElementById('btn-view-list').className = (view === 'list') ? "px-6 py-2 rounded-xl text-sm font-bold transition view-btn-active shadow-sm" : "px-6 py-2 rounded-xl text-sm font-bold transition view-btn-inactive";
            document.getElementById('btn-view-calendar').className = (view === 'calendar') ? "px-6 py-2 rounded-xl text-sm font-bold transition view-btn-active shadow-sm" : "px-6 py-2 rounded-xl text-sm font-bold transition view-btn-inactive";
            renderAll();
        };

        window.setFilter = (filter) => {
            currentFilter = filter;
            // Update UI for filter buttons
            document.querySelectorAll('.filter-btn').forEach(btn => {
                const isActive = btn.getAttribute('data-filter') === filter;
                btn.className = isActive 
                    ? "filter-btn px-4 py-1.5 rounded-full text-xs font-bold bg-blue-600 text-white shadow-md transition" 
                    : "filter-btn px-4 py-1.5 rounded-full text-xs font-bold bg-white text-slate-500 border border-slate-200 hover:border-blue-200 transition";
            });
            renderAll();
        };

        window.renderPatients = () => {
            const grid = document.getElementById('patientsGrid');
            const empty = document.getElementById('emptyState');
            const filtered = currentFilter === 'all' ? patients : patients.filter(p => p.grupo === currentFilter);
            
            if (filtered.length === 0) { grid.innerHTML = ''; empty.classList.remove('hidden'); return; }
            empty.classList.add('hidden');
            
            grid.innerHTML = filtered.map(p => {
                const perc = p.totalSesiones > 0 ? Math.round((p.completadas / p.totalSesiones) * 100) : 0;
                let tStats = '';
                if (p.terapias.fisica.total > 0) tStats += `<div class="therapy-badge text-blue-600 bg-blue-50 border-blue-100">F ${p.terapias.fisica.realizada}/${p.terapias.fisica.total}</div>`;
                if (p.terapias.ocupacional.total > 0) tStats += `<div class="therapy-badge text-purple-600 bg-purple-50 border-purple-100">O ${p.terapias.ocupacional.realizada}/${p.terapias.ocupacional.total}</div>`;
                if (p.terapias.respiratoria.total > 0) tStats += `<div class="therapy-badge text-emerald-600 bg-emerald-50 border-emerald-100">R ${p.terapias.respiratoria.realizada}/${p.terapias.respiratoria.total}</div>`;

                return `
                    <div class="card p-5 border border-slate-100 flex flex-col h-full bg-white rounded-2xl shadow-sm">
                        <div class="flex-grow">
                            <div class="flex justify-between items-start mb-1">
                                <span class="text-[9px] px-2 py-0.5 rounded-full font-bold uppercase border bg-slate-100 text-slate-600">${p.grupo}</span>
                                <div class="flex gap-1">${tStats}</div>
                            </div>
                            <h3 class="font-bold text-slate-800 text-lg mt-1 truncate">${p.nombre}</h3>
                            <p class="text-[11px] text-slate-400 mb-3 flex items-center gap-1"><i data-lucide="map-pin" class="w-3 h-3"></i><span class="truncate">${p.direccion}</span></p>
                            
                            <div class="bg-slate-50 p-3 rounded-xl border border-slate-100 mb-4">
                                <label class="text-[10px] font-bold text-slate-400 uppercase block mb-1">Hora Cita</label>
                                <div class="flex items-center gap-2">
                                    <i data-lucide="clock" class="w-4 h-4 text-slate-400"></i>
                                    <input type="text" placeholder="--:--" value="${p.horario || ''}" 
                                        onchange="window.updateSchedule(${p.id}, this.value)" 
                                        class="bg-transparent text-sm font-bold text-slate-700 outline-none w-full">
                                </div>
                            </div>
                        </div>
                        <div class="mt-auto">
                            <div class="flex justify-between text-[11px] mb-1 font-bold"><span class="text-slate-500 uppercase">Progreso</span><span class="text-blue-600">${p.completadas}/${p.totalSesiones}</span></div>
                            <div class="w-full bg-slate-100 h-2 rounded-full overflow-hidden mb-4"><div class="bg-blue-500 h-full transition-all duration-500" style="width:${perc}%"></div></div>
                            <button onclick="window.focusInput(${p.id})" class="w-full bg-slate-800 text-white py-2.5 rounded-xl text-xs font-bold hover:bg-slate-900 transition flex items-center justify-center gap-2">Asignar Cita</button>
                        </div>
                    </div>`;
            }).join('');
            if (typeof lucide !== 'undefined') lucide.createIcons();
        };

        window.renderCalendar = () => {
            const content = document.getElementById('calendarContent');
            const empty = document.getElementById('emptyState');
            const filtered = currentFilter === 'all' ? patients : patients.filter(p => p.grupo === currentFilter);
            const scheduled = filtered.filter(p => p.horario && p.horario.trim() !== '').sort((a, b) => a.horario.localeCompare(b.horario));
            
            if (scheduled.length === 0) { 
                content.innerHTML = ''; 
                if(currentView === 'calendar') empty.classList.remove('hidden'); 
                return; 
            }
            empty.classList.add('hidden');
            
            content.innerHTML = scheduled.map(p => `
                <div class="flex gap-4 items-center group">
                    <div class="w-20 text-right flex-shrink-0"><span class="text-sm font-black text-blue-600">${p.horario}</span></div>
                    <div class="flex-1 bg-slate-50 border-l-4 border-blue-500 p-4 rounded-r-xl group-hover:bg-white group-hover:shadow-md transition">
                        <div class="flex justify-between items-center">
                            <div class="flex-1 min-w-0">
                                <h4 class="font-bold text-slate-800 truncate">${p.nombre}</h4>
                                <p class="text-[11px] text-slate-500 truncate">${p.direccion}</p>
                            </div>
                            <div class="flex gap-2">
                                <button onclick="window.openConfirmModal(${p.id})" class="bg-emerald-50 text-emerald-600 px-3 py-1.5 rounded-lg text-xs font-bold hover:bg-emerald-100 transition flex items-center gap-1">
                                    <i data-lucide="check-circle-2" class="w-3 h-3"></i> Realizada
                                </button>
                                <button onclick="window.clearSchedule(${p.id})" class="bg-white border border-slate-200 text-slate-400 px-3 py-1.5 rounded-lg text-xs font-bold hover:text-red-500 transition">
                                    <i data-lucide="trash-2" class="w-3 h-3"></i>
                                </button>
                            </div>
                        </div>
                    </div>
                </div>`).join('');
            if (typeof lucide !== 'undefined') lucide.createIcons();
        };

        // --- Acciones del Usuario ---
        window.updateSchedule = (id, value) => {
            const idx = patients.findIndex(p => p.id === id);
            if (idx !== -1) {
                patients[idx].horario = value;
                syncToCloud(patients);
                if(value.trim() !== '') showToast("Cita programada");
                renderAll();
            }
        };

        window.clearSchedule = (id) => {
            const idx = patients.findIndex(p => p.id === id);
            if (idx !== -1) {
                patients[idx].horario = '';
                syncToCloud(patients);
                showToast("Cita removida");
                renderAll();
            }
        };

        window.focusInput = (id) => {
            showToast("Edita la hora en el recuadro blanco");
        };

        window.openConfirmModal = (id) => {
            activePatientId = id;
            const p = patients.find(x => x.id === id);
            if (!p) return;
            document.getElementById('confirmPatientName').innerText = p.nombre;
            const listDiv = document.getElementById('confirmTherapyList');
            listDiv.innerHTML = '';
            ['fisica', 'ocupacional', 'respiratoria'].forEach(type => {
                const t = p.terapias[type];
                if(t.total > 0 && t.realizada < t.total) {
                    const label = type === 'fisica' ? 'Física' : type === 'ocupacional' ? 'Ocupacional' : 'Respiratoria';
                    const item = document.createElement('label');
                    item.className = "flex items-center justify-between p-3 bg-slate-50 border border-slate-200 rounded-2xl cursor-pointer hover:bg-white transition mb-2";
                    item.innerHTML = `
                        <div class="flex flex-col">
                            <span class="text-sm font-bold text-slate-700">${label}</span>
                            <span class="text-[10px] text-slate-400">${t.realizada}/${t.total} sesiones</span>
                        </div>
                        <input type="checkbox" name="therapy-select" value="${type}" checked class="w-5 h-5 accent-emerald-600">`;
                    listDiv.appendChild(item);
                }
            });
            document.getElementById('confirmAgendaModal').classList.replace('hidden', 'flex');
        };

        window.validateTherapies = async () => {
            const p = patients.find(x => x.id === activePatientId);
            if (!p) return;
            const selected = document.querySelectorAll('input[name="therapy-select"]:checked');
            if (selected.length === 0) return;
            
            selected.forEach(cb => {
                const type = cb.value;
                if(p.terapias[type].realizada < p.terapias[type].total) {
                    p.terapias[type].realizada++;
                }
            });
            p.completadas = (p.terapias.fisica.realizada + p.terapias.ocupacional.realizada + p.terapias.respiratoria.realizada);
            p.horario = ''; 
            await syncToCloud(patients);
            closeModal('confirmAgendaModal');
            showToast("Sesión registrada exitosamente");
            renderAll();
        };

        // --- Inicialización y Auth ---
        const initAuth = async () => {
            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                await signInWithCustomToken(auth, __initial_auth_token);
            } else {
                await signInAnonymously(auth);
            }
        };

        onAuthStateChanged(auth, (user) => {
            currentUser = user;
            if (user) {
                const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'appState', 'main');
                onSnapshot(docRef, (snapshot) => {
                    if (snapshot.exists()) {
                        const cloudData = snapshot.data();
                        patients = cloudData.patients || [];
                        renderAll();
                        document.getElementById('syncStatus').innerText = "Nube Conectada";
                    } else {
                        const oldData = localStorage.getItem('terapia_patients');
                        if (oldData) {
                            patients = JSON.parse(oldData);
                            syncToCloud(patients);
                            localStorage.removeItem('terapia_patients');
                            showToast("Datos locales migrados a la nube");
                        } else {
                            fetchSheetData();
                        }
                    }
                }, (error) => {
                    console.error("Error en Snapshot:", error);
                    document.getElementById('syncStatus').innerText = "Error de Conexión";
                });
            } else {
                initAuth();
            }
        });

    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .view-btn-active { background-color: white !important; color: #2563eb !important; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); }
        .view-btn-inactive { color: #64748b !important; }
        .therapy-badge { display: flex; align-items: center; gap: 4px; padding: 2px 8px; border-radius: 8px; border: 1px solid; font-size: 10px; font-weight: 800; }
        #toast {
            visibility: hidden; min-width: 250px; margin-left: -125px; background-color: #1e293b;
            color: #fff; text-align: center; border-radius: 16px; padding: 16px;
            position: fixed; z-index: 100; left: 50%; bottom: 30px; font-size: 14px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
        }
        #toast.show { visibility: visible; animation: fadein 0.5s, fadeout 0.5s 2.5s; }
        @keyframes fadein { from {bottom: 0; opacity: 0;} to {bottom: 30px; opacity: 1;} }
        @keyframes fadeout { from {bottom: 30px; opacity: 1;} to {bottom: 0; opacity: 0;} }
    </style>
</head>
<body class="p-4 md:p-8">
    <div id="toast">Cita asignada</div>

    <div class="max-w-6xl mx-auto">
        <!-- Header -->
        <div class="flex flex-col md:flex-row md:items-center justify-between mb-8 gap-4">
            <div>
                <h1 class="text-3xl font-bold text-slate-800 tracking-tight">Gestión Terapéutica</h1>
                <div class="flex items-center gap-2">
                    <div class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></div>
                    <p class="text-slate-500 font-medium text-sm" id="syncStatus">Conectando...</p>
                </div>
            </div>
            <div class="flex gap-2">
                <button onclick="fetchSheetData()" class="bg-blue-600 hover:bg-blue-700 text-white px-5 py-2.5 rounded-xl flex items-center gap-2 transition shadow-lg shadow-blue-200">
                    <i data-lucide="refresh-cw" class="w-5 h-5" id="syncIcon"></i>
                    <span class="text-sm font-bold">Refrescar Excel</span>
                </button>
            </div>
        </div>

        <!-- Filtros y Vistas -->
        <div class="flex flex-wrap items-center justify-between gap-4 mb-8">
            <div class="flex bg-slate-200/50 p-1.5 rounded-2xl w-fit">
                <button id="btn-view-list" onclick="switchView('list')" class="px-6 py-2 rounded-xl text-sm font-bold transition view-btn-active">
                    Pacientes
                </button>
                <button id="btn-view-calendar" onclick="switchView('calendar')" class="px-6 py-2 rounded-xl text-sm font-bold transition view-btn-inactive">
                    Agenda Hoy
                </button>
            </div>

            <div class="flex gap-2 overflow-x-auto pb-2 md:pb-0">
                <button onclick="setFilter('all')" data-filter="all" class="filter-btn px-4 py-1.5 rounded-full text-xs font-bold bg-blue-600 text-white shadow-md transition">Todos</button>
                <button onclick="setFilter('lun_mie')" data-filter="lun_mie" class="filter-btn px-4 py-1.5 rounded-full text-xs font-bold bg-white text-slate-500 border border-slate-200 hover:border-blue-200 transition">Lun-Mie</button>
                <button onclick="setFilter('circasia')" data-filter="circasia" class="filter-btn px-4 py-1.5 rounded-full text-xs font-bold bg-white text-slate-500 border border-slate-200 hover:border-blue-200 transition">Circasia</button>
                <button onclick="setFilter('otros')" data-filter="otros" class="filter-btn px-4 py-1.5 rounded-full text-xs font-bold bg-white text-slate-500 border border-slate-200 hover:border-blue-200 transition">Otros</button>
            </div>
        </div>

        <!-- Vista Lista -->
        <div id="view-list">
            <div id="patientsGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
        </div>

        <!-- Vista Agenda -->
        <div id="view-calendar" class="hidden">
            <div class="bg-white rounded-3xl p-8 border border-slate-200 shadow-sm">
                <h2 class="text-xl font-bold text-slate-800 mb-8 flex items-center gap-3">
                    <i data-lucide="calendar" class="text-blue-600"></i> Orden del Día
                </h2>
                <div id="calendarContent" class="space-y-6"></div>
            </div>
        </div>

        <!-- Estado Vacío -->
        <div id="emptyState" class="hidden text-center py-20 bg-white rounded-3xl border-2 border-dashed border-slate-200 mt-6">
            <i data-lucide="folder-open" class="w-12 h-12 text-slate-300 mx-auto mb-4"></i>
            <p class="text-slate-500 font-medium">No hay pacientes en esta categoría.</p>
        </div>
    </div>

    <!-- Modales -->
    <div id="confirmAgendaModal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm hidden items-center justify-center z-50 p-4">
        <div class="bg-white p-8 rounded-3xl max-w-sm w-full shadow-2xl">
            <h3 class="text-xl font-bold text-slate-800 mb-1">Confirmar Visita</h3>
            <p id="confirmPatientName" class="text-sm text-slate-500 mb-6"></p>
            <div id="confirmTherapyList" class="mb-8"></div>
            <div class="space-y-3">
                <button onclick="validateTherapies()" class="w-full bg-emerald-600 text-white py-4 rounded-2xl font-bold shadow-lg shadow-emerald-100 hover:bg-emerald-700 transition">Registrar Sesiones</button>
                <button onclick="closeModal('confirmAgendaModal')" class="w-full bg-slate-100 text-slate-600 py-3 rounded-2xl font-bold text-sm">Cancelar</button>
            </div>
        </div>
    </div>

</body>
</html>
