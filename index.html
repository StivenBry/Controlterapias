<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control de Terapias - Sincronización Real</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lucide/0.263.0/lucide.min.js"></script>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-terapias';

        // Variables globales para acceso desde el script tradicional
        window.db = db;
        window.auth = auth;
        window.appId = appId;
        window.setDoc = setDoc;
        window.doc = doc;

        const initAuth = async () => {
            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                await signInWithCustomToken(auth, __initial_auth_token);
            } else {
                await signInAnonymously(auth);
            }
        };

        // ESCUCHA EN TIEMPO REAL (Regla 1 y 3)
        onAuthStateChanged(auth, (user) => {
            if (user) {
                const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'patients_state');
                
                // onSnapshot mantiene los dispositivos sincronizados automáticamente
                onSnapshot(docRef, (docSnap) => {
                    if (docSnap.exists()) {
                        const cloudData = docSnap.data().list;
                        if (JSON.stringify(cloudData) !== JSON.stringify(window.patients)) {
                            window.patients = cloudData;
                            localStorage.setItem('terapia_patients', JSON.stringify(window.patients));
                            window.renderAll();
                            console.log("Datos sincronizados desde la nube");
                        }
                    }
                }, (error) => console.error("Error en tiempo real:", error));
            }
        });

        initAuth();
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; }
        .card { background: white; border-radius: 16px; transition: all 0.2s; border: 1px solid #e2e8f0; }
        .card:hover { transform: translateY(-2px); box-shadow: 0 12px 20px -5px rgba(0,0,0,0.1); }
        .tab-active { border-bottom: 3px solid #2563eb; color: #2563eb; }
        #toast {
            visibility: hidden; min-width: 250px; background-color: #1e293b; color: #fff;
            text-align: center; border-radius: 12px; padding: 16px; position: fixed;
            z-index: 100; left: 50%; bottom: 30px; transform: translateX(-50%);
        }
        #toast.show { visibility: visible; animation: fadein 0.5s, fadeout 0.5s 2.5s; }
        @keyframes fadein { from {bottom: 0; opacity: 0;} to {bottom: 30px; opacity: 1;} }
        @keyframes fadeout { from {bottom: 30px; opacity: 1;} to {bottom: 0; opacity: 0;} }
    </style>
</head>
<body class="p-4 md:p-8">
    <div id="toast">Actualizado</div>

    <div class="max-w-5xl mx-auto">
        <!-- Header -->
        <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 gap-4">
            <div>
                <h1 class="text-3xl font-bold text-slate-900">Mis Pacientes</h1>
                <div class="flex items-center gap-2 text-emerald-600 font-medium text-sm">
                    <span class="relative flex h-2 w-2">
                        <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span>
                        <span class="relative inline-flex rounded-full h-2 w-2 bg-emerald-500"></span>
                    </span>
                    Nube Conectada (Multi-dispositivo)
                </div>
            </div>
            <div class="flex gap-2">
                <button onclick="fetchSheetData()" id="syncBtn" class="bg-blue-600 hover:bg-blue-700 text-white px-5 py-2.5 rounded-xl flex items-center gap-2 transition font-semibold shadow-lg shadow-blue-200">
                    <i data-lucide="download-cloud" class="w-5 h-5"></i>
                    Importar Excel
                </button>
            </div>
        </div>

        <!-- Tabs -->
        <div class="flex bg-white p-1 rounded-xl shadow-sm border border-slate-200 mb-6 w-full md:w-max">
            <button onclick="switchView('list')" id="btn-list" class="flex-1 md:flex-none px-6 py-2 rounded-lg font-bold text-sm transition bg-blue-50 text-blue-600">Pacientes</button>
            <button onclick="switchView('calendar')" id="btn-calendar" class="flex-1 md:flex-none px-6 py-2 rounded-lg font-bold text-sm transition text-slate-500">Agenda Hoy</button>
        </div>

        <!-- Vista Lista -->
        <div id="view-list">
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6" id="patientsGrid"></div>
        </div>

        <!-- Vista Agenda -->
        <div id="view-calendar" class="hidden">
            <div class="bg-white rounded-2xl p-6 border border-slate-200 shadow-sm">
                <h2 class="text-xl font-bold text-slate-800 mb-6 flex items-center gap-2">
                    <i data-lucide="list-checks" class="text-blue-600"></i> Orden del Día
                </h2>
                <div id="calendarContent" class="space-y-4 text-slate-500 italic">No hay citas programadas para hoy.</div>
            </div>
        </div>

        <!-- Mensaje de Carga -->
        <div id="emptyState" class="hidden text-center py-20 bg-white rounded-3xl border border-slate-200 mt-6">
            <i data-lucide="database" class="w-12 h-12 text-slate-300 mx-auto mb-4"></i>
            <p class="text-slate-500 font-medium">No hay datos. Importa desde el Excel.</p>
        </div>
    </div>

    <!-- Modales -->
    <div id="therapyModal" class="fixed inset-0 bg-slate-900/50 backdrop-blur-sm hidden items-center justify-center z-50 p-4">
        <div class="bg-white rounded-3xl p-6 max-w-sm w-full shadow-2xl">
            <h3 class="text-xl font-bold text-slate-800 mb-1" id="modalPatientName">Paciente</h3>
            <p class="text-sm text-slate-400 mb-6">Selecciona las terapias realizadas hoy</p>
            <div id="therapyCheckboxes" class="space-y-3 mb-6"></div>
            <button onclick="confirmTherapies()" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-bold shadow-lg shadow-blue-100 mb-2">Guardar como Realizado</button>
            <button onclick="closeModal()" class="w-full text-slate-500 py-2 font-semibold">Cancelar</button>
        </div>
    </div>

    <script>
        const SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vR3XP2U3MKFx76JAmsKf2h5Q-YODYrgZe1JeuK053Ip1BIYa8RuAJnDBJVjpbNOo_YqYcG1K92cRJ5i/pub?output=csv';
        
        window.patients = JSON.parse(localStorage.getItem('terapia_patients')) || [];
        let activeId = null;

        function showToast(msg) {
            const t = document.getElementById("toast");
            t.innerText = msg;
            t.classList.add("show");
            setTimeout(() => t.classList.remove("show"), 2500);
        }

        async function syncToCloud() {
            if (!window.auth.currentUser) return;
            try {
                const docRef = window.doc(window.db, 'artifacts', window.appId, 'public', 'data', 'patients_state');
                await window.setDoc(docRef, { list: window.patients, updatedBy: window.auth.currentUser.uid, timestamp: Date.now() });
            } catch (e) {
                console.error("Error al subir:", e);
            }
        }

        async function fetchSheetData() {
            const btn = document.getElementById('syncBtn');
            btn.disabled = true;
            btn.innerHTML = `<i data-lucide="loader-2" class="w-5 h-5 animate-spin"></i> Cargando...`;
            
            try {
                const res = await fetch(SHEET_URL);
                const text = await res.text();
                const lines = text.split('\n');
                const headers = lines[0].split(',').map(h => h.trim().replace(/"/g, ''));
                
                const rawData = [];
                for (let i = 1; i < lines.length; i++) {
                    if (!lines[i].trim()) continue;
                    const cols = lines[i].split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                    const obj = {};
                    headers.forEach((h, idx) => obj[h] = (cols[idx] || "").trim().replace(/"/g, ''));
                    rawData.push(obj);
                }

                // FILTRO: Evitar pacientes sin nombre
                const processed = rawData
                    .filter(r => (r.Nombre || r.Paciente || "").trim() !== "")
                    .map((r, idx) => {
                        const name = r.Nombre || r.Paciente;
                        const existing = window.patients.find(p => p.nombre === name);
                        
                        const f = parseInt(r['T. FISICA'] || r['FISICA'] || 0);
                        const o = parseInt(r['T. OCUPACIONAL'] || r['OCUPACIONAL'] || 0);
                        const r_ = parseInt(r['T.RESPIRA'] || r['RESPIRATORIA'] || 0);

                        return {
                            id: existing ? existing.id : (Date.now() + idx),
                            nombre: name,
                            direccion: r.Direccion || r.Dirección || 'Sin dirección',
                            horario: existing ? existing.horario : '',
                            terapias: {
                                fisica: { t: f, r: existing ? existing.terapias.fisica.r : 0 },
                                ocupacional: { t: o, r: existing ? existing.terapias.ocupacional.r : 0 },
                                respiratoria: { t: r_, r: existing ? existing.terapias.respiratoria.r : 0 }
                            },
                            total: f + o + r_,
                            completas: existing ? existing.completas : 0
                        };
                    });

                window.patients = processed;
                localStorage.setItem('terapia_patients', JSON.stringify(window.patients));
                await syncToCloud();
                window.renderAll();
                showToast("Datos actualizados");
            } catch (e) {
                showToast("Error de conexión");
            } finally {
                btn.disabled = false;
                btn.innerHTML = `<i data-lucide="download-cloud" class="w-5 h-5"></i> Importar Excel`;
                lucide.createIcons();
            }
        }

        window.renderAll = () => {
            renderList();
            renderCalendar();
            lucide.createIcons();
        };

        function renderList() {
            const grid = document.getElementById('patientsGrid');
            const empty = document.getElementById('emptyState');
            
            if (window.patients.length === 0) {
                grid.innerHTML = '';
                empty.classList.remove('hidden');
                return;
            }
            empty.classList.add('hidden');

            grid.innerHTML = window.patients.map(p => {
                const prog = p.total > 0 ? Math.round((p.completas / p.total) * 100) : 0;
                return `
                <div class="card p-5 flex flex-col justify-between">
                    <div>
                        <div class="flex justify-between items-start mb-3">
                            <h3 class="font-bold text-slate-800 text-lg leading-tight">${p.nombre}</h3>
                            <span class="text-[10px] font-bold bg-slate-100 px-2 py-1 rounded text-slate-500 uppercase">PACIENTE</span>
                        </div>
                        <p class="text-xs text-slate-400 mb-4 flex items-center gap-1">
                            <i data-lucide="map-pin" class="w-3 h-3"></i> ${p.direccion}
                        </p>
                        
                        <div class="space-y-2 mb-4">
                            <div class="flex justify-between text-[11px] font-bold">
                                <span class="text-slate-400">SESIONES COMPLETADAS</span>
                                <span class="text-blue-600">${p.completas} / ${p.total}</span>
                            </div>
                            <div class="w-full bg-slate-100 h-2 rounded-full overflow-hidden">
                                <div class="bg-blue-500 h-full transition-all duration-500" style="width: ${prog}%"></div>
                            </div>
                        </div>
                    </div>

                    <div class="bg-blue-50 p-3 rounded-xl border border-blue-100 mb-4">
                        <label class="text-[9px] font-black text-blue-400 uppercase block mb-1">Programar Hora</label>
                        <input type="time" value="${p.horario}" onchange="updateTime(${p.id}, this.value)" 
                               class="bg-transparent w-full font-bold text-blue-700 outline-none">
                    </div>

                    <button onclick="openTherapyModal(${p.id})" class="w-full py-3 bg-slate-900 text-white rounded-xl font-bold text-xs hover:bg-black transition">
                        Gestionar Terapias
                    </button>
                </div>`;
            }).join('');
        }

        function renderCalendar() {
            const container = document.getElementById('calendarContent');
            const scheduled = window.patients.filter(p => p.horario).sort((a,b) => a.horario.localeCompare(b.horario));
            
            if (scheduled.length === 0) {
                container.innerHTML = `<div class="text-center py-10 text-slate-400">No hay pacientes citados para hoy</div>`;
                return;
            }

            container.innerHTML = scheduled.map(p => `
                <div class="flex items-center gap-4 p-4 rounded-2xl bg-slate-50 border border-slate-100">
                    <div class="text-blue-600 font-black text-lg w-16">${p.horario}</div>
                    <div class="flex-1">
                        <div class="font-bold text-slate-800">${p.nombre}</div>
                        <div class="text-xs text-slate-400">${p.direccion}</div>
                    </div>
                    <button onclick="openTherapyModal(${p.id})" class="p-2 bg-white text-emerald-500 rounded-full border shadow-sm">
                        <i data-lucide="check-circle-2" class="w-6 h-6"></i>
                    </button>
                </div>
            `).join('');
        }

        function updateTime(id, time) {
            const p = window.patients.find(x => x.id === id);
            p.horario = time;
            localStorage.setItem('terapia_patients', JSON.stringify(window.patients));
            syncToCloud();
            renderCalendar();
            showToast("Hora guardada");
        }

        function openTherapyModal(id) {
            activeId = id;
            const p = window.patients.find(x => x.id === id);
            document.getElementById('modalPatientName').innerText = p.nombre;
            const container = document.getElementById('therapyCheckboxes');
            container.innerHTML = '';

            const types = { fisica: 'Física', ocupacional: 'Ocupacional', respiratoria: 'Respiratoria' };
            Object.keys(types).forEach(k => {
                const t = p.terapias[k];
                if (t.t > 0 && t.r < t.t) {
                    container.innerHTML += `
                        <label class="flex items-center justify-between p-4 bg-slate-50 rounded-2xl cursor-pointer border-2 border-transparent has-[:checked]:border-blue-500 has-[:checked]:bg-blue-50 transition">
                            <div>
                                <div class="font-bold text-slate-700">${types[k]}</div>
                                <div class="text-[10px] text-slate-400">Pendientes: ${t.t - t.r} de ${t.t}</div>
                            </div>
                            <input type="checkbox" value="${k}" class="w-5 h-5 accent-blue-600">
                        </label>`;
                }
            });

            if (container.innerHTML === '') container.innerHTML = `<p class="text-center text-emerald-600 font-bold py-4">¡Todas las sesiones completadas!</p>`;
            document.getElementById('therapyModal').classList.replace('hidden', 'flex');
        }

        async function confirmTherapies() {
            const p = window.patients.find(x => x.id === activeId);
            const checks = document.querySelectorAll('#therapyCheckboxes input:checked');
            
            checks.forEach(c => {
                const type = c.value;
                p.terapias[type].r++;
                p.completadas++;
            });

            p.horario = ''; // Se quita de la agenda una vez hecha la terapia
            localStorage.setItem('terapia_patients', JSON.stringify(window.patients));
            await syncToCloud();
            closeModal();
            window.renderAll();
            showToast("Progreso sincronizado");
        }

        function closeModal() { document.getElementById('therapyModal').classList.replace('flex', 'hidden'); }

        function switchView(view) {
            document.getElementById('view-list').classList.toggle('hidden', view !== 'list');
            document.getElementById('view-calendar').classList.toggle('hidden', view !== 'calendar');
            document.getElementById('btn-list').className = view === 'list' ? "px-6 py-2 rounded-lg font-bold text-sm bg-blue-50 text-blue-600" : "px-6 py-2 rounded-lg font-bold text-sm text-slate-500";
            document.getElementById('btn-calendar').className = view === 'calendar' ? "px-6 py-2 rounded-lg font-bold text-sm bg-blue-50 text-blue-600" : "px-6 py-2 rounded-lg font-bold text-sm text-slate-500";
            lucide.createIcons();
        }

        window.onload = () => {
            window.renderAll();
        };
    </script>
</body>
</html>
